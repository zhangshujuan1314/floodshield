# alembic.ini - FloodShield async Alembic configuration

[alembic]
script_location = alembic
# sqlalchemy.url is read from the DATABASE_URL environment variable at runtime
# via env.py. Do NOT hardcode it here.
# sqlalchemy.url = driver://user:pass@localhost/dbname

# Template used to generate migration file names
file_template = %%(rev)s_%%(slug)s

# Timezone for migration timestamps
timezone = Asia/Shanghai

# Truncate long revision ids in filenames
truncate_slug_length = 40

# Max length of characters to apply to the "slug" field
# output_encoding = utf-8

[post_write_hooks]
# Format migration files with black after generation
# hooks = black
# black.type = console_scripts
# black.entrypoint = black

[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARN
handlers = console

[logger_sqlalchemy]
level = WARN
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
